kind = "web"
previewPath = "/"
title = "ZuruSasa"
version = "1.0.0"
id = "artifacts/zurusasa"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20875

[services.development]
run = "pnpm --filter @workspace/zurusasa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zurusasa", "run", "build" ]
serve = "static"
publicDir = "artifacts/zurusasa/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20875"
BASE_PATH = "/"
